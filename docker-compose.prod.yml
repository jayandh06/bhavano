services:
  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID}
      MSG91_DLT_TEMPLATE_ID: ${MSG91_DLT_TEMPLATE_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # No admin signup flow exists — a phone/email matching one of these gets promoted
      # to role=admin automatically on login.
      ADMIN_PHONES: ${ADMIN_PHONES}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      MSG91_TRANSACTIONAL_TEMPLATE_ID: ${MSG91_TRANSACTIONAL_TEMPLATE_ID}
      # Photo storage — Cloudflare R2 (S3-compatible), served publicly through CDN_BASE_URL.
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      CDN_BASE_URL: ${CDN_BASE_URL}
      # Razorpay — listing boosts (see docs/plans/monetization-boosted-listings-premium-tiers.md).
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      # Google Maps — server-side reverse geocoding for the map pin-picker (see
      # docs/plans/google-maps-location-picker.md). Never sent to any client.
      GOOGLE_MAPS_SERVER_KEY: ${GOOGLE_MAPS_SERVER_KEY}
    volumes:
      # Rotating request/response logs, shared read-only with the alloy container below —
      # see docs/plans/bff-loki-grafana-logging.md.
      - bff_logs:/app/apps/bff/logs
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      # Server-side fetches from the web app's Next.js server go straight to the bff
      # container over the compose network — never through the public internet.
      BFF_INTERNAL_URL: http://bff:4000
      # The browser talks to the bff directly only for the WebSocket (messaging) connection,
      # so this one has to be the public bff URL, not the internal one above.
      NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID}
      # Google Maps JavaScript API + Places — the posting flow's map pin-picker (see
      # docs/plans/google-maps-location-picker.md). HTTP-referrer restricted, safe for the
      # browser — never reuse GOOGLE_MAPS_SERVER_KEY (bff, above) here.
      NEXT_PUBLIC_GOOGLE_MAPS_JS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_JS_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Required behind a reverse proxy (Caddy) — otherwise NextAuth v5 rejects every
      # request with "UntrustedHost" since the forwarded Host header isn't localhost.
      AUTH_TRUST_HOST: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - bff
    expose:
      - "3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      BFF_INTERNAL_URL: http://bff:4000
      NEXTAUTH_URL: ${ADMIN_NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${ADMIN_NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - bff
    expose:
      - "3001"

  # --- Logging / observability (docs/plans/bff-loki-grafana-logging.md) ---
  # Alloy tails the BFF's rotating log files off the shared `bff_logs` volume and ships them
  # into Loki. (Promtail is in Grafana's own maintenance mode now — Alloy is the recommended
  # replacement for any new log-shipping setup.)
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    volumes:
      - bff_logs:/var/log/bff:ro
      - ./observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${LOGS_DOMAIN}
      # Every dashboard/Explore view reads in IST regardless of who's looking or from where —
      # this is an India-only platform, timestamps should never silently show UTC/browser-local.
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Asia/Kolkata
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      APEX_DOMAIN: ${APEX_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      LOGS_DOMAIN: ${LOGS_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - bff
      - admin
      - grafana

volumes:
  caddy-data:
  caddy-config:
  bff_logs:
  loki_data:
  grafana_data:
