services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: bhavano
      POSTGRES_PASSWORD: bhavano
      POSTGRES_DB: bhavano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  typesense:
    image: typesense/typesense:27.1
    environment:
      TYPESENSE_API_KEY: local-dev-key
      TYPESENSE_DATA_DIR: /data
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data

volumes:
  postgres_data:
  redis_data:
  typesense_data:
